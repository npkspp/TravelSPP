<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelSPP вАФ –Љ–Є–Ї—А–Њ–±–ї–Њ–≥ –њ—Г—В–µ—И–µ—Б—В–≤–Є—П</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f7; font-family: Inter, sans-serif; display: flex; height: 100vh; overflow: hidden; }
#map { width: 60%; height: 100vh; flex-shrink: 0; }
#resizer { width: 6px; cursor: col-resize; background: #e5e5e5; flex-shrink: 0; }
#resizer:hover, #resizer.active { background: #ff00dd; }
#feed { flex: 1; padding: 6px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; height: 100vh; position: relative; }

/* –Ъ–љ–Њ–њ–Ї–∞ –љ–Њ–≤–Њ–≥–Њ –њ–Њ—Б—В–∞ */
#addPostBtn {
  position: sticky; top: 0; z-index: 10;
  background: #ff00dd; color: #fff; border: none;
  padding: 10px 16px; font-size: 14px; font-family: Inter, sans-serif;
  cursor: pointer; width: 100%; margin-bottom: 4px;
  transition: background .2s;
}
#addPostBtn:hover { background: #d400b8; }

/* –Ъ–∞—А—В–Њ—З–Ї–∞ –њ–Њ—Б—В–∞ */
.post-card { background: #fff; border: 1px solid #e5e5e5; padding: 8px 10px; cursor: pointer; display: flex; flex-direction: column; }
.post-card:hover { border-color: #cfcfcf; }
.post-row { display: flex; }
.post-content { flex: 1; overflow: hidden; }
.post-meta { font-size: 12px; color: #8e8e93; margin-bottom: 4px; display: flex; gap: 8px; }
.post-text { font-size: 14px; line-height: 1.4; color: #111; }
.post-text p { margin: 0; }
.post-text img { display: none; }
.post-thumb { flex-shrink: 0; margin-left: 10px; }
.post-thumb img { width: 60px; height: 60px; object-fit: cover; }
.post-author { font-weight: 600; color: #333; }

/* –Ъ–Њ–Љ–Љ–µ–љ—В–∞—А–Є–Є */
.comments-toggle { font-size: 12px; color: #8e8e93; cursor: pointer; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; }
.comments-toggle:hover { color: #ff00dd; }
.comments-block { display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; }
.comments-block.open { display: block; }
.comment { font-size: 13px; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
.comment-author { font-weight: 600; color: #555; }
.comment-text { color: #111; margin-top: 2px; }
.comment-date { font-size: 11px; color: #aaa; }
.comment-form { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
.comment-form input, .comment-form textarea { font-family: Inter, sans-serif; font-size: 13px; padding: 6px; border: 1px solid #e5e5e5; }
.comment-form button { background: #ff00dd; color: #fff; border: none; padding: 6px; cursor: pointer; font-family: Inter, sans-serif; font-size: 13px; }

/* –Ь–Њ–і–∞–ї–Ї–∞ */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; padding: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
.modal h3 { margin-bottom: 12px; font-size: 18px; }
.modal label { font-size: 13px; color: #555; display: block; margin-top: 8px; }
.modal input, .modal textarea { width: 100%; font-family: Inter, sans-serif; font-size: 14px; padding: 8px; border: 1px solid #e5e5e5; margin-top: 4px; }
.modal textarea { min-height: 80px; resize: vertical; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 12px; }
.modal .btn-primary { background: #ff00dd; color: #fff; border: none; padding: 10px 16px; cursor: pointer; font-family: Inter, sans-serif; flex: 1; }
.modal .btn-secondary { background: #e5e5e5; border: none; padding: 10px 16px; cursor: pointer; font-family: Inter, sans-serif; flex: 1; }
.modal .btn-geo { background: #eee; border: 1px solid #ddd; padding: 8px; cursor: pointer; font-family: Inter, sans-serif; font-size: 13px; width: 100%; margin-top: 4px; }
.modal .btn-geo:hover { background: #ddd; }
.coord-hint { font-size: 11px; color: #999; margin-top: 2px; }

@media (max-width: 768px) {
  body { flex-direction: column; }
  #map { width: 100% !important; height: 50vh; }
  #resizer { display: none; }
  #feed { width: 100%; height: 50vh; }
}
</style>
</head>
<body>

<div id="map"></div>
<div id="resizer"></div>
<div id="feed"></div>

<!-- –Ь–Њ–і–∞–ї–Ї–∞ –љ–Њ–≤–Њ–≥–Њ –њ–Њ—Б—В–∞ -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <h3>вЮХ –Э–Њ–≤—Л–є –њ–Њ—Б—В</h3>
    <label>–Т–∞—И–µ –Є–Љ—П</label>
    <input type="text" id="authorName" placeholder="–Э–∞–њ—А–Є–Љ–µ—А: –Ф–Љ–Є—В—А–Є–є">
    <label>–Ґ–µ–Ї—Б—В –њ–Њ—Б—В–∞</label>
    <textarea id="postText" placeholder="–І—В–Њ –њ—А–Њ–Є–Ј–Њ—И–ї–Њ?"></textarea>
    <label>–§–Њ—В–Њ (–љ–µ–Њ–±—П–Ј–∞—В–µ–ї—М–љ–Њ)</label>
    <input type="file" id="postPhoto" accept="image/*">
    <label>–Ъ–Њ–Њ—А–і–Є–љ–∞—В—Л (–љ–µ–Њ–±—П–Ј–∞—В–µ–ї—М–љ–Њ)</label>
    <button class="btn-geo" id="geoBtn">рЯУН –Ю–њ—А–µ–і–µ–ї–Є—В—М –Љ–µ—Б—В–Њ–њ–Њ–ї–Њ–ґ–µ–љ–Є–µ</button>
    <input type="text" id="coordInput" placeholder="–Ш–ї–Є –≤—А—Г—З–љ—Г—О: 39.723, 73.247">
    <div class="coord-hint" id="coordStatus"></div>
    <div class="btn-row">
      <button class="btn-secondary" id="cancelBtn">–Ю—В–Љ–µ–љ–∞</button>
      <button class="btn-primary" id="publishBtn">–Ю–њ—Г–±–ї–Є–Ї–Њ–≤–∞—В—М</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPABASE_URL = "https://kvlybnqrzubxmcmgmuaa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bHlibnFyenVieG1jbWdtdWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODc2MTYsImV4cCI6MjEwMDE2MzYxNn0.E5XqLVc_CJJoKWUt3E1SFEny4tQ1CiLXwrulWk1X6R4";

const map = L.map('map').setView([39.5, 73], 9);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  attribution: '&copy; Esri', maxZoom: 18
}).addTo(map);

let markers = [];
let selectedLat = null;
let selectedLng = null;
let selectedFile = null;

// === –Ч–Р–У–†–£–Ч–Ъ–Р –Я–Ю–°–Ґ–Ю–Т ===
function loadPosts() {
  fetch(`${SUPABASE_URL}/rest/v1/posts?order=created_at.desc`, {
    headers: { apikey: SUPABASE_ANON_KEY }
  })
  .then(r => r.json())
  .then(posts => {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    // –Ъ–љ–Њ–њ–Ї–∞ –љ–Њ–≤–Њ–≥–Њ –њ–Њ—Б—В–∞
    const addBtn = document.createElement('button');
    addBtn.id = 'addPostBtn';
    addBtn.textContent = 'вЮХ –Э–Њ–≤—Л–є –њ–Њ—Б—В';
    addBtn.onclick = openModal;
    feed.appendChild(addBtn);

    if (posts.length === 0) {
      feed.innerHTML += '<div style="padding:20px;text-align:center;color:#999;">–Я–Њ–Ї–∞ –љ–µ—В –њ–Њ—Б—В–Њ–≤. –Ф–Њ–±–∞–≤—М—В–µ –њ–µ—А–≤—Л–є!</div>';
      return;
    }

    posts.forEach(post => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.dataset.postId = post.id;

      let thumbHtml = '';
      if (post.image_urls && post.image_urls.length > 0) {
        thumbHtml = `<img src="${post.image_urls[0]}">`;
      }
      const date = post.local_time_str || new Date(post.created_at).toLocaleDateString('ru-RU', { day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' });
      const author = post.author_name || '–Я—Г—В–µ—И–µ—Б—В–≤–µ–љ–љ–Є–Ї';

      card.innerHTML = `
        <div class="post-row">
          <div class="post-content">
            <div class="post-meta"><span>${date}</span> <span class="post-author">рЯС§ ${author}</span></div>
            <div class="post-text"><p>${post.text.replace(/\n/g, '<br>')}</p></div>
          </div>
          <div class="post-thumb">${thumbHtml}</div>
        </div>
        <div class="comments-toggle" onclick="toggleComments(this, ${post.id})">рЯТђ –Ч–∞–≥—А—Г–Ј–Є—В—М –Ї–Њ–Љ–Љ–µ–љ—В–∞—А–Є–Є</div>
        <div class="comments-block" id="comments-${post.id}"></div>
      `;
      feed.appendChild(card);

      if (post.lat && post.lng) {
        const marker = L.circleMarker([post.lat, post.lng], { radius: 6, fillColor: '#ff00dd', color: '#fff', weight: 1, fillOpacity: 0.8 }).addTo(map);
        marker.on('click', () => { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); });
        card.querySelector('.post-row').addEventListener('click', () => { map.flyTo([post.lat, post.lng], Math.max(map.getZoom(), 12), { duration: 0.5 }); });
        markers.push(marker);
      }
    });

    if (posts.some(p => p.lat && p.lng)) {
      const coords = posts.filter(p => p.lat && p.lng).map(p => [p.lat, p.lng]);
      map.fitBounds(coords, { padding: [30, 30] });
    }
  });
}

// === –Ъ–Ю–Ь–Ь–Х–Э–Ґ–Р–†–Ш–Ш ===
function toggleComments(el, postId) {
  const block = document.getElementById(`comments-${postId}`);
  if (block.classList.contains('open')) {
    block.classList.remove('open');
    el.textContent = 'рЯТђ –Ъ–Њ–Љ–Љ–µ–љ—В–∞—А–Є–Є';
    return;
  }
  block.classList.add('open');
  el.textContent = 'рЯТђ –Ч–∞–≥—А—Г–Ј–Ї–∞...';

  fetch(`${SUPABASE_URL}/rest/v1/comments?post_id=eq.${postId}&order=created_at.asc`, {
    headers: { apikey: SUPABASE_ANON_KEY }
  })
  .then(r => r.json())
  .then(comments => {
    let html = '';
    if (comments.length === 0) {
      html = '<div style="font-size:13px;color:#999;padding:4px 0;">–Я–Њ–Ї–∞ –љ–µ—В –Ї–Њ–Љ–Љ–µ–љ—В–∞—А–Є–µ–≤</div>';
    } else {
      comments.forEach(c => {
        const d = new Date(c.created_at).toLocaleDateString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
        html += `<div class="comment"><div class="comment-author">${escapeHtml(c.author_name)}</div><div class="comment-text">${escapeHtml(c.text)}</div><div class="comment-date">${d}</div></div>`;
      });
    }
    html += `
      <div class="comment-form">
        <input type="text" id="commentName-${postId}" placeholder="–Т–∞—И–µ –Є–Љ—П">
        <textarea id="commentText-${postId}" placeholder="–Э–∞–њ–Є—И–Є—В–µ –Ї–Њ–Љ–Љ–µ–љ—В–∞—А–Є–є..." rows="2"></textarea>
        <button onclick="postComment(${postId})">–Ю—В–њ—А–∞–≤–Є—В—М</button>
      </div>
    `;
    block.innerHTML = html;
    el.textContent = `рЯТђ ${comments.length} –Ї–Њ–Љ–Љ–µ–љ—В–∞—А–Є–µ–≤`;
  });
}

function postComment(postId) {
  const name = document.getElementById(`commentName-${postId}`).value.trim();
  const text = document.getElementById(`commentText-${postId}`).value.trim();
  if (!name || !text) { alert('–Ч–∞–њ–Њ–ї–љ–Є—В–µ –Є–Љ—П –Є —В–µ–Ї—Б—В'); return; }

  fetch(`${SUPABASE_URL}/rest/v1/comments`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ post_id: postId, author_name: name, text: text })
  })
  .then(r => {
    if (r.status >= 200 && r.status < 300) {
      document.getElementById(`commentName-${postId}`).value = '';
      document.getElementById(`commentText-${postId}`).value = '';
      // –Ю–±–љ–Њ–≤–Є–Љ comments
      const el = document.querySelector(`#comments-${postId}`).previousElementSibling;
      if (el && el.classList.contains('comments-toggle')) {
        el.click();
        setTimeout(() => el.click(), 100);
      }
    } else {
      alert('–Ю—И–Є–±–Ї–∞ –њ—А–Є –Њ—В–њ—А–∞–≤–Ї–µ –Ї–Њ–Љ–Љ–µ–љ—В–∞—А–Є—П');
    }
  })
  .catch(() => alert('–Ю—И–Є–±–Ї–∞ —Б–µ—В–Є'));
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// === –Ь–Ю–Ф–Р–Ы–Ъ–Р –Э–Ю–Т–Ю–У–Ю –Я–Ю–°–Ґ–Р ===
function openModal() {
  document.getElementById('postModal').classList.add('open');
  selectedLat = null;
  selectedLng = null;
  selectedFile = null;
  document.getElementById('authorName').value = '';
  document.getElementById('postText').value = '';
  document.getElementById('postPhoto').value = '';
  document.getElementById('coordInput').value = '';
  document.getElementById('coordStatus').textContent = '';
}
document.getElementById('cancelBtn').onclick = () => {
  document.getElementById('postModal').classList.remove('open');
};
document.getElementById('postModal').onclick = (e) => {
  if (e.target === e.currentTarget) document.getElementById('postModal').classList.remove('open');
};

document.getElementById('postPhoto').onchange = (e) => {
  selectedFile = e.target.files[0] || null;
};

document.getElementById('geoBtn').onclick = () => {
  if (!navigator.geolocation) {
    document.getElementById('coordStatus').textContent = '–У–µ–Њ–ї–Њ–Ї–∞—Ж–Є—П –љ–µ –њ–Њ–і–і–µ—А–ґ–Є–≤–∞–µ—В—Б—П';
    return;
  }
  document.getElementById('coordStatus').textContent = '–Ю–њ—А–µ–і–µ–ї—П—О...';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      selectedLat = pos.coords.latitude;
      selectedLng = pos.coords.longitude;
      document.getElementById('coordInput').value = `${selectedLat.toFixed(6)}, ${selectedLng.toFixed(6)}`;
      document.getElementById('coordStatus').textContent = 'вЬЕ –Ъ–Њ–Њ—А–і–Є–љ–∞—В—Л –Њ–њ—А–µ–і–µ–ї–µ–љ—Л';
    },
    () => {
      document.getElementById('coordStatus').textContent = 'вЭМ –Э–µ —Г–і–∞–ї–Њ—Б—М –Њ–њ—А–µ–і–µ–ї–Є—В—М. –Т–≤–µ–і–Є—В–µ –≤—А—Г—З–љ—Г—О.';
    }
  );
};

document.getElementById('coordInput').oninput = (e) => {
  const val = e.target.value.trim();
  const match = val.match(/^([\d\.\-]+)\s*[,;:\s]+\s*([\d\.\-]+)$/);
  if (match) {
    selectedLat = parseFloat(match[1]);
    selectedLng = parseFloat(match[2]);
    document.getElementById('coordStatus').textContent = 'вЬЕ –Ъ–Њ–Њ—А–і–Є–љ–∞—В—Л –≤–≤–µ–і–µ–љ—Л';
  } else {
    selectedLat = null;
    selectedLng = null;
    if (val) document.getElementById('coordStatus').textContent = 'вЭМ –§–Њ—А–Љ–∞—В: 39.723, 73.247';
    else document.getElementById('coordStatus').textContent = '';
  }
};

document.getElementById('publishBtn').onclick = async () => {
  const name = document.getElementById('authorName').value.trim();
  const text = document.getElementById('postText').value.trim();
  if (!name) { alert('–Т–≤–µ–і–Є—В–µ –≤–∞—И–µ –Є–Љ—П'); return; }
  if (!text) { alert('–Т–≤–µ–і–Є—В–µ —В–µ–Ї—Б—В –њ–Њ—Б—В–∞'); return; }

  document.getElementById('publishBtn').textContent = 'вП≥ –Я—Г–±–ї–Є–Ї—Г—О...';
  document.getElementById('publishBtn').disabled = true;

  let imageUrls = null;

  // –Ч–∞–≥—А—Г–ґ–∞–µ–Љ —Д–Њ—В–Њ –µ—Б–ї–Є –µ—Б—В—М
  if (selectedFile) {
    const filename = `${Date.now()}_${selectedFile.name}`;
    try {
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/photos/${filename}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
        body: selectedFile
      });
      if (uploadRes.ok || uploadRes.status === 200) {
        imageUrls = [`${SUPABASE_URL}/storage/v1/object/photos/${filename}`];
      }
    } catch(e) { console.log('Upload error:', e); }
  }

  // –°–Њ–Ј–і–∞—С–Љ –њ–Њ—Б—В
  const now = new Date();
  const months = ['—П–љ–≤–∞—А—П','—Д–µ–≤—А–∞–ї—П','–Љ–∞—А—В–∞','–∞–њ—А–µ–ї—П','–Љ–∞—П','–Є—О–љ—П','–Є—О–ї—П','–∞–≤–≥—Г—Б—В–∞','—Б–µ–љ—В—П–±—А—П','–Њ–Ї—В—П–±—А—П','–љ–Њ—П–±—А—П','–і–µ–Ї–∞–±—А—П'];
  const localTimeStr = `${now.getDate()} ${months[now.getMonth()]}, ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        text: text,
        author_name: name,
        image_urls: imageUrls,
        lat: selectedLat,
        lng: selectedLng,
        local_time_str: localTimeStr
      })
    });

    if (res.ok || res.status === 201) {
      document.getElementById('postModal').classList.remove('open');
      loadPosts();
    } else {
      alert('–Ю—И–Є–±–Ї–∞ –њ—А–Є –њ—Г–±–ї–Є–Ї–∞—Ж–Є–Є');
    }
  } catch(e) {
    alert('–Ю—И–Є–±–Ї–∞ —Б–µ—В–Є');
  }

  document.getElementById('publishBtn').textContent = '–Ю–њ—Г–±–ї–Є–Ї–Њ–≤–∞—В—М';
  document.getElementById('publishBtn').disabled = false;
};

// === –†–Х–°–Р–Щ–Ч–Х–† ===
loadPosts();

const resizer = document.getElementById('resizer');
const mapEl = document.getElementById('map');
let isResizing = false;
resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.userSelect = 'none'; });
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  let w = (e.clientX / window.innerWidth) * 100;
  if (w < 15) w = 15; if (w > 85) w = 85;
  mapEl.style.width = w + '%';
  map.invalidateSize();
});
document.addEventListener('mouseup', () => { isResizing = false; document.body.style.userSelect = ''; });
</script>
</body>
</html>
